<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crime Scene Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto&display=swap"
        rel="stylesheet">
    <style>
        body {
            color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #220000 50%, #0f0f0f 100%); /* Dark to deep red gradient */
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column; /* Stack navigation bar and content */
            align-items: center;
            justify-content: flex-start; /* Align items from the top */
            min-height: 100vh; /* Keep this to ensure it fills the screen initially */
            margin: 0;
            overflow: hidden; /* Prevent scrolling on the body */
        }

        nav {
            width: 100%;
            background-color: rgba(26, 26, 26, 0.85); /* Dark background with transparency */
            border-bottom: 1px solid #ff4757; /* Consistent accent color */
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 100px;;
        }

        nav a {
            color: #e0e0e0;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #ff4757; /* Consistent link hover effect */
        }

        nav .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color:#ff4757;
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            gap: 1.5rem;
        }

        .form-container {
            max-width: 28rem;
            width: 100%;
            padding: 2rem;
            background-color: rgba(26, 26, 26, 0.85); /* Dark background with transparency */
            border: 1px solid #ff4757; /* Consistent accent color */
            border-radius: 0.5rem;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.3); /* Consistent shadow */
            margin-top: 2rem; /* Add some space between nav and form */
        }

        .form-slide {
            transition: all 0.5s ease-in-out;
        }

        .form-hidden {
            transform: translateX(100%);
            opacity: 0;
            position: absolute;
            width: 100%;
        }

        .form-visible {
            transform: translateX(0);
            opacity: 1;
            position: relative;
            width: 100%;
        }

        label {
            color: #ff4757; /* Consistent label color */
        }

        input[type="text"],
        input[type="password"] {
            background-color: #0f0f0f;
            border: 1px solid #444;
            color: #e0e0e0;
        }

        input[type="checkbox"] {
            accent-color: #ff4757; /* Consistent checkbox color */
        }

        button {
            background-color: #ff4757; /* Consistent button color */
            color: white;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #ff6b81; /* Consistent hover effect */
        }

        a {
            color: #ff4757; /* Consistent link color within the form */
            font-weight: medium;
            transition: color 0.3s;
        }

        a:hover {
            color: #ff6b81; /* Consistent link hover effect within the form */
        }
    </style>
</head>

<body>
    <nav>
        <a href="#" class="logo">CrimeSceneSolver</a>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="upload.html">Upload</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="relative w-full max-w-md form-container">
        <div id="loginForm" class="form-slide form-visible">
            <h2 class="text-3xl font-bold text-center text-[#ff4757]" style="font-family: 'Orbitron', sans-serif;">Login</h2>
            <p class="text-sm text-center text-gray-400 mt-1">Authorized personnel only</p>
            <form class="mt-6 space-y-4" method="POST" action="#">
                <div>
                    <label for="username" class="block text-sm font-medium">Username</label>
                    <input type="text" id="username" name="username" required
                        class="w-full mt-1 px-3 py-2 rounded bg-[#0f0f0f] border border-gray-600 text-white focus:outline-none" />
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium">Password</label>
                    <input type="password" id="password" name="password" required
                        class="w-full mt-1 px-3 py-2 rounded bg-[#0f0f0f] border border-gray-600 text-white focus:outline-none" />
                    <label class="text-sm mt-2 inline-flex items-center text-gray-300">
                        <input type="checkbox" onclick="togglePassword('password')" class="mr-2"> Show password
                    </label>
                </div>
                <button type="submit"
                    class="w-full bg-[#ff4757] text-white font-semibold py-2 px-4 rounded hover:bg-[#ff6b81] transition">Sign
                    in</button>
            </form>
            <p class="text-sm text-center text-gray-400 mt-4">
                Don’t have access?
                <button onclick="toggleForm()" class="text-[#ff4757] font-medium hover:bg-transparent ">Sign up</button>
            </p>
        </div>

        <div id="signupForm" class="form-slide form-hidden">
            <h2 class="text-3xl font-bold text-center text-[#ff4757]">Sign Up</h2>
            <p class="text-sm text-center text-gray-400 mt-1">Request access to the system</p>
            <form class="mt-6 space-y-4" method="POST" action="#">
                <div>
                    <label for="new-username" class="block text-sm font-medium">Username</label>
                    <input type="text" id="new-username" name="new-username" required
                        class="w-full mt-1 px-3 py-2 rounded bg-[#0f0f0f] border border-gray-600 text-white focus:outline-none" />
                </div>
                <div>
                    <label for="new-password" class="block text-sm font-medium">Create Password</label>
                    <input type="password" id="new-password" name="new-password" required
                        class="w-full mt-1 px-3 py-2 rounded bg-[#0f0f0f] border border-gray-600 text-white focus:outline-none" />
                    <label class="text-sm mt-2 inline-flex items-center text-gray-300">
                        <input type="checkbox" onclick="togglePassword('new-password')" class="mr-2"> Show password
                    </label>
                </div>
                <button type="submit"
                    class="w-full bg-[#ff4757] text-white font-semibold py-2 px-4 rounded hover:bg-[#ff6b81] transition">Request
                    Access</button>
            </form>
            <p class="text-sm text-center text-gray-400 mt-4">
                Already authorized?
                <button onclick="toggleForm()" class="text-[#ff4757] font-medium hover:bg-transparent">Back to
                    login</button>
            </p>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById("loginForm");
        const signupForm = document.getElementById("signupForm");

        function toggleForm() {
            if (loginForm.classList.contains("form-visible")) {
                loginForm.classList.remove("form-visible");
                loginForm.classList.add("form-hidden");
                signupForm.classList.remove("form-hidden");
                signupForm.classList.add("form-visible");
            } else {
                signupForm.classList.remove("form-visible");
                signupForm.classList.add("form-hidden");
                loginForm.classList.remove("form-hidden");
                loginForm.classList.add("form-visible");
            }
        }

        function togglePassword(id) {
            const field = document.getElementById(id);
            field.type = field.type === "password" ? "text" : "password";
        }
    </script>
</body>

</html>
